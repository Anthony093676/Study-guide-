<script>

function askFeedback() {

let feedback = prompt("How do you like this page? (Good / Okay / Needs improvement)");

if (feedback === "Good") {
    alert("Thank you! I'm glad you like the page.");
}

else if (feedback === "Okay") {
    alert("Thanks! I will try to improve it.");
}

else if (feedback === "Needs improvement") {
    alert("Thank you for the feedback! I will work on improving it.");
}

else {
    alert("Thanks for visiting the Student Corner!");
}

}

askFeedback();

</script>
